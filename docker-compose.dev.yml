services:
  traefik:
    image: traefik:v2.11
    command:
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --log.level=INFO
    ports:
      - "80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.testing.maurc.org`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: papers-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-papers}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    labels:
      - traefik.enable=false
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: papers-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    labels:
      - traefik.enable=false
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: papers-backend
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-papers}
      - DB_PORT=${DB_PORT:-5432}
      - PORT=8000
      - STORAGE_PATH=/app/storage/papers
      - DEBUG=${DEBUG:-true}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    labels:
      - traefik.enable=true
      # Main application router
      - traefik.http.routers.papers-backend.rule=Host(`api.testing.maurc.org`)
      - traefik.http.routers.papers-backend.entrypoints=web
      - traefik.http.routers.papers-backend.service=papers-backend-service
      # Main application service
      - traefik.http.services.papers-backend-service.loadbalancer.server.port=8000
      - traefik.http.services.papers-backend-service.loadbalancer.healthcheck.path=/health
      - traefik.http.services.papers-backend-service.loadbalancer.healthcheck.interval=10s
      - traefik.http.services.papers-backend-service.loadbalancer.healthcheck.timeout=3s
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # container_name: papers-celery-worker
    command: uv run celery -A app.celery_app worker -l info -Q ai,processing,discovery,dead_letter -c 4
    deploy:
      replicas: 2
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-papers}
      - DB_PORT=${DB_PORT:-5432}
      - STORAGE_PATH=/app/storage/papers
      - DEBUG=${DEBUG:-true}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY}
      - SERPAPI_KEY=${SERPAPI_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - storage_data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    labels:
      - traefik.enable=false
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-v2
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    container_name: papers-frontend
    depends_on:
      - backend
    networks:
      - app-network
    labels:
      - traefik.enable=true
      # Main application router
      - traefik.http.routers.papers-frontend.rule=Host(`testing.maurc.org`)
      - traefik.http.routers.papers-frontend.entrypoints=web
      - traefik.http.routers.papers-frontend.service=papers-frontend-service
      # Main application service
      - traefik.http.services.papers-frontend-service.loadbalancer.server.port=4173
      - traefik.http.services.papers-frontend-service.loadbalancer.healthcheck.path=/
      - traefik.http.services.papers-frontend-service.loadbalancer.healthcheck.interval=10s
      - traefik.http.services.papers-frontend-service.loadbalancer.healthcheck.timeout=3s
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  storage_data:
